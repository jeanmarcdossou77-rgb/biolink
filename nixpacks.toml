[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.gd",
  "php83Extensions.bcmath",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate:fresh --force && php artisan db:seed --class=PathologieSeeder --force && php artisan db:seed --class=MassPathologieSeeder --force && php artisan db:seed --class=ExtraPathologieSeeder --force && php artisan db:seed --class=FinalPathologieSeeder --force && php artisan db:seed --class=UpdateCausesSeeder --force && php artisan serve --host=0.0.0.0 --port=$PORT"