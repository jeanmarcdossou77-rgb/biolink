<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00c87a"/>
    </linearGradient>
  </defs>
  <!-- Fond cercle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00e5a0" stroke-width="2"/>
  <!-- Checkmark épais bien centré -->
  <polyline
    points="12,33 25,46 52,18"
    fill="none"
    stroke="url(#g1)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Petits points biologiques décoratifs -->
  <circle cx="54" cy="12" r="3" fill="#00e5a0" opacity="0.6"/>
  <circle cx="46" cy="8" r="2" fill="#378ADD" opacity="0.5"/>
  <line x1="51" y1="11" x2="48" y2="9.5" stroke="#00e5a0" stroke-width="1.5" opacity="0.5"/>
</svg>